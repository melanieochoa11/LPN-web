<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reactivos – LPN</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="css/app.css">
  <style>
    #reacControlWrap { margin-top: 12px; }
    #reacControlWrap .control-checkbox { display: flex; align-items: center; gap: 10px; font-weight: 650; }
    #reacControlWrap input[type="checkbox"] { width: 18px; height: 18px; }
    input[type="file"] { background: rgba(255, 255, 255, 0.90); }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="left">
      <button id="backHomeReact" class="back-btn" aria-label="Volver">←</button>
      <img class="logo" src="logo.png" alt="Logo del laboratorio" loading="lazy">
      <h1>Reactivos</h1>
    </div>
    <img class="brand" src="ikiam-logo.png" alt="Ikiam" loading="lazy">
  </header>
  <main class="app-main">
    <div class="container">
    <!-- Paso 1 -->
    <div class="card" id="reacStep1">
      <h2>Búsqueda de reactivos</h2>
      <p class="help">Si es controlado, el sistema pedira adjuntar el documento de solicitud.</p>
      <div class="field">
        <label for="reacBusqueda">Reactivo</label>
        <input type="text" id="reacBusqueda" list="reacList" placeholder="Escribe o selecciona el reactivo" autocomplete="off">
      </div>
      <datalist id="reacList"></datalist>
      <div class="actions">
        <button id="buscarReactivoBtn" class="btn btn-primary" type="button">Buscar</button>
      </div>
    </div>
    <!-- Paso 2: Detalle y acción -->
    <div class="card hidden" id="reacStep2">
      <h2 id="reacNombre">Reactivo</h2>
      <div class="step-layout">
        <div class="details">
          <div class="field">
            <label for="reacAccion">Tipo de accion</label>
            <select id="reacAccion">
            <option value="">– selecciona –</option>
            <option value="Solicitud">Solicitud</option>
            <option value="Registro">Registro</option>
            </select>
          </div>
          <!-- Formulario común a solicitud y registro -->
          <div id="reacFormCommon" class="hidden">
            <div class="field">
              <label for="reacCantidad">Cantidad</label>
              <input type="number" id="reacCantidad" min="0" step="0.01" placeholder="Cantidad">
            </div>
            <div class="field">
              <label for="reacUnidad">Unidad</label>
              <select id="reacUnidad">
              <option value="">– unidad –</option>
              <option value="g">g</option>
              <option value="mg">mg</option>
              <option value="mL">mL</option>
              <option value="L">L</option>
              <option value="otro">Otro</option>
              </select>
            </div>
            <!-- Contenedor de reactivo controlado: se ubica inmediatamente después de la unidad -->
            <div id="reacControlWrap">
              <label for="reacControlado" class="control-checkbox">
                <input type="checkbox" id="reacControlado">
                Reactivo controlado
              </label>
              <div id="reacFileDiv" class="hidden">
                <div class="field">
                  <label for="reacFile">Solicitud de reactivo (PDF/imagen)</label>
                  <input type="file" id="reacFile" accept="application/pdf,image/*">
                </div>
              </div>
            </div>
            <div id="unidadOtroDiv" class="hidden">
              <div class="field">
                <label for="reacUnidadOtro">Especificar unidad</label>
                <input type="text" id="reacUnidadOtro" placeholder="Unidad">
              </div>
            </div>
          </div>
          <!-- Campo específico para Solicitud -->
          <div id="reacFormSolicitud" class="hidden">
            <div class="field">
              <label for="reacLabDestino">Laboratorio de destino</label>
              <input type="text" id="reacLabDestino" placeholder="Laboratorio de destino">
            </div>
          </div>
        </div>
        <div class="media">
          <img class="catalog" id="reacImg" src="" alt="Imagen del reactivo" loading="lazy">
        </div>
      </div>
      <div class="actions">
        <button id="reacCancelStep2" class="btn btn-secondary" type="button">Cancelar</button>
        <button id="reacAddBtn" class="btn btn-secondary" type="button">Agregar</button>
        <button id="reacFinalizarBtn" class="btn btn-primary" type="button">Finalizar</button>
      </div>
    </div>
    <!-- Paso 3: Resumen y datos generales -->
    <div class="card hidden" id="reacStep3">
      <h2>Resumen de reactivos</h2>
      <div id="reacResumen" class="summary"></div>
      <div class="field">
        <label for="reacNombreUsuario">Nombre</label>
        <input type="text" id="reacNombreUsuario" placeholder="Nombre completo" required>
      </div>
      <div class="field">
        <label for="reacCorreoUsuario">Correo institucional</label>
        <input type="email" id="reacCorreoUsuario" placeholder="usuario@ikiam.edu.ec" required>
      </div>
      <div class="field">
        <label for="reacFecha">Fecha</label>
        <input type="text" id="reacFecha" placeholder="dd/mm/aaaa" readonly>
      </div>
      <div class="field">
        <label for="reacTipoAct">Tipo de actividad</label>
        <select id="reacTipoAct">
        <option value="">– selecciona –</option>
        <option value="Práctica">Práctica</option>
        <option value="Proyecto">Proyecto</option>
        <option value="Tesis">Tesis</option>
        </select>
      </div>
      <div class="field">
        <label for="reacNombreAct">Nombre de la actividad</label>
        <input type="text" id="reacNombreAct" placeholder="Nombre de la actividad">
      </div>
      <div class="actions">
        <button id="reacBackToSearch" class="btn btn-secondary" type="button">Volver</button>
        <button id="reacEnviarBtn" class="btn btn-primary" type="button">Enviar</button>
      </div>
    </div>
    </div>
  </main>
  <footer class="app-footer">
    <p><strong>Contacto:</strong> melani.ochoa@ikiam.edu.ec</p>
    <p><strong>Teléfono:</strong> 0959546317</p>
    <p><strong>Ubicación:</strong> LPN - Laboratorio de Productos Naturales – Tena, Ecuador</p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <!-- Importamos el módulo desde la carpeta js -->
  <script type="module" src="js/reactivos.js"></script>
</body>
</html>
